<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GỌI TÊN AI - Cyberpunk Edition</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
</head>
<body>

    <!-- ===== MÀN HÌNH NHẬP KEY ===== -->
    <div id="keyOverlay" style="
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:radial-gradient(circle,#000d1a,#000);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        z-index:9999;font-family:'Courier New',monospace;
    ">
        <div style="text-align:center;padding:20px;max-width:340px;width:90%;">
            <div style="font-size:2em;margin-bottom:8px;">⚡</div>
            <h2 style="color:#0ff;text-shadow:0 0 15px #0ff;letter-spacing:3px;margin-bottom:6px;">GỌI TÊN AI</h2>
            <p style="color:#888;font-size:0.85em;margin-bottom:24px;">Nhập key để sử dụng</p>

            <input id="keyInput" type="text" placeholder="GT-DDMMYYYY-XXXXXXXX"
                style="width:100%;padding:12px;font-size:1em;font-family:'Courier New',monospace;
                background:#000;color:#0ff;border:2px solid #0ff;border-radius:8px;
                text-align:center;letter-spacing:2px;outline:none;box-sizing:border-box;"
                onkeydown="if(event.key==='Enter')checkKey()">

            <button onclick="checkKey()" style="
                margin-top:14px;width:100%;padding:12px;font-size:1em;font-weight:bold;
                background:linear-gradient(135deg,#0ff,#00ffaa);color:#000;
                border:none;border-radius:8px;cursor:pointer;font-family:'Courier New',monospace;
                text-transform:uppercase;letter-spacing:2px;">
                XÁC NHẬN
            </button>

            <div id="keyError" style="color:#f55;margin-top:12px;font-size:0.85em;min-height:20px;"></div>
        </div>
    </div>

    <!-- Cột trái: header + status + camera -->
    <div class="left-col">
        <div class="header">
            <h1>⚡ GỌI TÊN SIÊU CẤP AI ⚡</h1>
        </div>

        <div class="status" id="status">Đang khởi động AI...</div>

        <div class="camera-section-full">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <!-- Controls: hàng ngang (portrait) / cột dọc bên phải (landscape) -->
    <div class="button-container">
        <div class="time-control">
            <label for="scanDuration"><span id="durationValue">5</span>s</label>
            <input type="range" id="scanDuration" min="1" max="10" value="5" step="1">
        </div>

        <button id="startButton" disabled>BẮT ĐẦU</button>

        <div class="scan-timer-horizontal" id="scanTimerHorizontal">
            <div class="scan-timer-fill-horizontal" id="scanTimerFillHorizontal"></div>
        </div>

        <div class="camera-selector">
            <select id="cameraSelect">
                <option value="">Đang tải...</option>
            </select>
        </div>
    </div>

    <!-- Kết quả -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-content">
            <div class="result-title">••• BIOMETRIC RESULT •••</div>
            <img id="resultImageLarge" class="result-image-large" alt="Kết quả">
            <div class="result-buttons">
                <button class="btn-celebrate" id="btnCelebrate">CHÚC MỪNG!</button>
                <button class="btn-continue" id="btnContinue">TIẾP TỤC QUÉT</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
