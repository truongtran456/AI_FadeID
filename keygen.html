<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo Key - Admin</title>
<style>
  body { font-family: monospace; background: #111; color: #0ff; padding: 30px; }
  h2 { margin-bottom: 20px; }
  button { padding: 12px 28px; font-size: 1em; border-radius: 8px; border: none; background: #0ff; color: #000; font-weight: bold; cursor: pointer; }
  #output { margin-top: 24px; padding: 16px; border: 2px solid #0f0; border-radius: 8px; display: none; }
  #key-text { font-size: 1.3em; color: #0f0; letter-spacing: 2px; word-break: break-all; }
  #copy-btn { margin-top: 12px; padding: 8px 18px; background: #0f0; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.95em; }
  #copy-msg { color: #ff0; margin-top: 8px; display: none; }
</style>
</head>
<body>
<h2>🔑 TẠO KEY CHO KHÁCH HÀNG - GỌI TÊN AI NGẪU NHIÊN</h2>
<button onclick="genKey()">Tạo Key mới</button>

<div id="output">
  <div style="margin-bottom:8px;color:#aff;">Key:</div>
  <div id="key-text"></div>
  <br>
  <button id="copy-btn" onclick="copyKey()">📋 Copy Key</button>
  <div id="copy-msg">✅ Đã copy!</div>
</div>

<script>
const SECRET = 'GIAOVIENHIENDAI';

async function sha256Short(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2,'0'))
        .join('')
        .substring(0, 12)
        .toUpperCase();
}

async function genKey() {
    // Mã ngẫu nhiên 6 ký tự → mỗi lần tạo ra key khác nhau
    const rand = Math.random().toString(36).substring(2, 8).toUpperCase();
    const hash = await sha256Short(SECRET + rand);
    const key = `GT-${rand}-${hash}`;

    document.getElementById('key-text').textContent = key;
    document.getElementById('output').style.display = 'block';
    document.getElementById('copy-msg').style.display = 'none';
}

function copyKey() {
    const key = document.getElementById('key-text').textContent;
    navigator.clipboard.writeText(key).then(() => {
        document.getElementById('copy-msg').style.display = 'block';
    });
}
</script>
</body>
</html>
