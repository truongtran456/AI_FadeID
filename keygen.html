<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo Key - Admin</title>
<style>
  body { font-family: monospace; background: #111; color: #0ff; padding: 30px; }
  h2 { margin-bottom: 20px; }
  label { display: block; margin: 10px 0 4px; color: #aff; }
  input { padding: 8px 14px; font-size: 1em; border-radius: 6px; border: 2px solid #0ff; background: #000; color: #0ff; width: 220px; }
  button { margin-top: 16px; padding: 10px 24px; font-size: 1em; border-radius: 6px; border: none; background: #0ff; color: #000; font-weight: bold; cursor: pointer; }
  #output { margin-top: 24px; padding: 16px; border: 2px solid #0f0; border-radius: 8px; display: none; }
  #key-text { font-size: 1.3em; color: #0f0; letter-spacing: 2px; }
  #copy-btn { margin-top: 10px; padding: 6px 16px; background: #0f0; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<h2>🔑 Tạo Key cho khách hàng</h2>

<label>Ngày hết hạn:</label>
<input type="date" id="expire">

<br>
<button onclick="genKey()">Tạo Key</button>

<div id="output">
  <div>Key:</div>
  <div id="key-text"></div>
  <button id="copy-btn" onclick="copyKey()">📋 Copy</button>
  <div id="copy-msg" style="color:#ff0;margin-top:6px;display:none">Đã copy!</div>
</div>

<script>
// ⚠️ Giữ bí mật chuỗi này, không chia sẻ cho ai
const SECRET = 'GOITEN_SECRET_2025_XYZ';

async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2,'0'))
        .join('')
        .substring(0, 8)
        .toUpperCase();
}

async function genKey() {
    const expireInput = document.getElementById('expire').value; // YYYY-MM-DD
    if (!expireInput) { alert('Vui lòng chọn ngày hết hạn'); return; }

    // Kiểm tra ngày hết hạn phải sau hôm nay
    const expireDate = new Date(expireInput);
    const today = new Date();
    today.setHours(0,0,0,0);
    if (expireDate <= today) { alert('Ngày hết hạn phải sau hôm nay'); return; }

    // Format: DDMMYYYY để nhúng vào key
    const [y, m, d] = expireInput.split('-');
    const expireStr = `${d}${m}${y}`; // DDMMYYYY

    // Hash để chống giả mạo
    const hash = await sha256(SECRET + expireStr);
    const key = `GT-${expireStr}-${hash}`;

    document.getElementById('key-text').textContent = key;
    document.getElementById('output').style.display = 'block';
    document.getElementById('copy-msg').style.display = 'none';
}

function copyKey() {
    const key = document.getElementById('key-text').textContent;
    navigator.clipboard.writeText(key).then(() => {
        document.getElementById('copy-msg').style.display = 'block';
    });
}
</script>
</body>
</html>
